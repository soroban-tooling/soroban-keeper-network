name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Lint & Format ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (all features)
        run: cargo clippy --all --all-targets --all-features -- -D warnings

  # ── Unit & Integration Tests ─────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run unit tests
        run: cargo test --all --features testutils -- --nocapture

  # ── WASM Build ───────────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install soroban CLI
        run: |
          curl -sSL https://raw.githubusercontent.com/stellar/soroban-tools/main/scripts/install_soroban.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build WASM (release)
        run: |
          cargo build --release --target wasm32-unknown-unknown \
            --package keeper-registry

      - name: Install wasm-opt
        run: |
          cargo install wasm-opt --locked || true

      - name: Optimize WASM
        run: |
          WASM_FILE="target/wasm32-unknown-unknown/release/keeper_registry.wasm"
          if [ -f "$WASM_FILE" ]; then
            wasm-opt -Oz --strip-debug "$WASM_FILE" -o "${WASM_FILE%.wasm}.optimized.wasm"
            ls -lh "${WASM_FILE%.wasm}.optimized.wasm"
          fi

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: keeper-registry-wasm
          path: |
            target/wasm32-unknown-unknown/release/keeper_registry.wasm
            target/wasm32-unknown-unknown/release/keeper_registry.optimized.wasm
          retention-days: 30

  # ── Security Audit ───────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit

  # ── Example Bot (Node.js) ────────────────────────────────────────────────────
  example-bot:
    name: Keeper Bot (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: examples/keeper-bot/package.json

      - name: Install dependencies
        working-directory: examples/keeper-bot
        run: npm install

      - name: Lint bot code
        working-directory: examples/keeper-bot
        run: npm run lint --if-present

      - name: Type check (if TypeScript)
        working-directory: examples/keeper-bot
        run: npm run typecheck --if-present || true
